<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>绘梦社</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background-color: #000;
        }

        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            opacity: 1;
            filter: brightness(1.2);
            pointer-events: none;
        }

        body {
            min-height: 100vh;
            padding: 30px 20px;
            text-align: center;
            color: #ffffff;
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #111;
        }

        img,
        video:not(.bg-video) {
            max-width: 60%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            margin: 25px auto;
            display: block;
        }

        h1 {
            font-size: 32px;
            margin: 20px 0;
            text-shadow: 0 3px 6px rgba(0, 0, 0, 0.7);
            font-weight: bold;
        }

        h2 {
            font-size: 24px;
            margin: 15px 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            font-weight: bold;
        }

        p {
            font-size: 18px;
            line-height: 1.8;
            margin: 10px 0;
        }

        a {
            color: #4fc3f7;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }

        a:hover {
            color: #81d4fa;
            text-decoration: underline;
        }

        #notice {
            max-width: 800px;
            margin: 20px auto;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            line-height: 1.8;
            font-size: 17px;
            text-align: left;
            white-space: pre-line;
        }

        /* 遮罩层增强背景视频的视觉效果 */
        .mask-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
    </style>
</head>

<body>
    <div class="mask-layer"></div>

    <div class="video-container">
        <video class="bg-video" autoplay muted loop playsinline>
            <source src="video/index/noa.mp4" type="video/mp4">
        </video>
    </div>

    <h1>HMS</h1>
    <h1>绘梦社</h1>

    <h1>!准备出发!</h1>
    <video controls>
        <source src="video/index/ba.mp4" type="video/mp4">
    </video>
     
     <h1>Take Me Hand</h1>
     <audio controls>
         <source src="music/Take Me Hand.mp3" type="audio/mpeg">
     </audio>

    <h1>绘梦之人</h1>
    <p>社长:谢依婷</p>
    <p>副社长:林一淼</p>
    <p>纪律委员:刘淑琳</p>
    <p>
        <a href="zhy.html" title="进入站长的介绍页" target="_blank">
            宣传与技术委员:zhy
        </a>
    </p>
    <p>成员太多了，懒得去写</p>

    <h1>公告</h1>
    <div id="notice">加载中...</div>

    <script>
        fetch('notice.txt')
            .then(res => {
                if (!res.ok) throw new Error(`HTTP 错误！状态码：${res.status}`);
                return res.text();
            })
            .then(text => {
                document.getElementById('notice').innerText = text;
            })
            .catch(err => {
                document.getElementById('notice').innerText = `加载失败：${err.message}`;
                console.error('公告加载错误:', err);
            });
    </script>
</body>
</html>
